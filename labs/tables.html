<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>HTML TABLES 101</title>
    </head>
    <body>
        <section id="simple-table">
            <h2> Simple Table</h2>
            <table border="1">
                <section>
                <section id="course-table">
            <h2>Course Table</h2>
            <table border="1">

                    <tr>
                        <th>Semester</th>

                    </tr>
                    <tr>
                        <th></th>
                        <th>BBIT 1</th>
                        <th>BBIT 2</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td rowspan="3"></td>
                        <td>Prog</td>
                        <td>OOP</td>
                    </tr>
                    <tr>
                        <td>DB</td>
                        <td>WAD</td>
                    </tr>
                    <tr> 
                        <td>Ethics</td>
                        <td>PA</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </body>
</html>
